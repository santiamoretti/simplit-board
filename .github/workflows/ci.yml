name: ci
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      # Validate syntax on every supported Python — this catches the f-string / version-specific
      # breakage class before it ever reaches a client's board.
      - run: python -m compileall -q src/simplit_board
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m pip install dist/*.whl && simplit-board --help

  release:
    needs: syntax
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip build && python -m build
      # Publish the built wheel + sdist as a GitHub Release so clients download instead of building.
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
